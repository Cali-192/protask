<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProTask | Dashboard</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="todo.css"> 
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#4361ee">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2098/2098402.png">
    
    <style>
        /* Mbrojtja që faqja të mos "shkrepë" para kontrollit */
        body { opacity: 0; transition: opacity 0.3s ease; font-family: 'Plus Jakarta Sans', sans-serif; }
        body.auth-checked { opacity: 1; }

        /* Rregullimi për Dark Mode në Dashboard */
        body.dark-theme {
            background-color: #0b0f1a !important;
            color: #ffffff !important;
        }
        body.dark-theme .card:not(.bg-primary):not(.bg-success) {
            background-color: #172035 !important;
            border-color: rgba(255,255,255,0.1) !important;
            color: white !important;
        }
        body.dark-theme .text-muted, body.dark-theme .text-white-50 {
            color: #a0aec0 !important;
        }
        body.dark-theme .sidebar {
            background-color: #172035 !important;
            border-right: 1px solid rgba(255,255,255,0.05);
        }
        body.dark-theme .bg-light {
            background-color: rgba(255,255,255,0.05) !important;
        }

        /* Stilimi për Menunë e Poshtme në Telefon */
        .mobile-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.05);
            z-index: 1000;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
        }
        
        body.dark-theme .mobile-nav {
            background: #172035;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .mobile-nav a {
            color: #888;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 12px;
            transition: 0.3s;
        }
        .mobile-nav a.active {
            color: #4361ee;
        }
        .mobile-nav i {
            font-size: 20px;
            margin-bottom: 4px;
        }

        .card-stats {
            transition: transform 0.3s ease;
        }
        .card-stats:hover {
            transform: translateY(-5px);
        }

        @media (max-width: 991px) {
            body { padding-bottom: 80px; }
            .content-area { padding-top: 20px !important; }
        }

        /* Custom scrollbar për Dark Mode */
        body.dark-theme::-webkit-scrollbar { width: 8px; }
        body.dark-theme::-webkit-scrollbar-track { background: #0b0f1a; }
        body.dark-theme::-webkit-scrollbar-thumb { background: #172035; border-radius: 10px; }
    </style>

    <script>
        // 1. MBROJTJA: Kontrolli i loginit para ngarkimit të DOM
        if (!localStorage.getItem('proTaskUserName')) {
            window.location.href = "index.html";
        }

        // 2. DARK MODE: Aktivizimi i menjëhershëm në nivel dokumenti
        if (localStorage.getItem('darkMode') === 'enabled') {
            document.documentElement.classList.add('dark-theme');
        }
    </script>
</head>
<body class="bg-light">

    <div class="mobile-nav d-lg-none">
        <a href="dashboard.html" class="active">
            <i class="fas fa-home"></i>
            <span>Kreu</span>
        </a>
        <a href="todo.html">
            <i class="fas fa-tasks"></i>
            <span>Detyrat</span>
        </a>
        <a href="calendar.html">
            <i class="fas fa-calendar-alt"></i>
            <span>Kalendari</span>
        </a>
        <a href="#" onclick="logout()" class="text-danger">
            <i class="fas fa-sign-out-alt"></i>
            <span>Dil</span>
        </a>
    </div>

    <div class="main-wrapper d-flex">
        <nav class="sidebar d-none d-lg-block">
            <div class="p-4">
                <div class="logo-area mb-5">
                    <h4 class="fw-bold text-primary"><i class="fas fa-check-double me-2"></i>ProTask</h4>
                </div>
                <div class="nav-links">
                    <a href="dashboard.html" class="nav-item active mb-2"><i class="fas fa-home me-3"></i>Dashboard</a>
                    <a href="todo.html" class="nav-item mb-2"><i class="fas fa-tasks me-3"></i>Detyrat</a>
                    <a href="calendar.html" class="nav-item mb-2"><i class="fas fa-calendar-alt me-3"></i>Kalendari</a>
                    <a href="settings.html" class="nav-item mb-2"><i class="fas fa-cog me-3"></i>Cilësimet</a>
                </div>
            </div>
            <div class="sidebar-footer p-4">
                <button onclick="logout()" class="btn btn-outline-danger btn-sm w-100">
                    <i class="fas fa-sign-out-alt me-2"></i>Dil nga sistemi
                </button>
            </div>
        </nav>

        <main class="content-area flex-grow-1 p-3 p-md-5">
            <div class="container" style="max-width: 1100px;">
                
                <div class="d-flex justify-content-between align-items-center mb-5">
                    <div>
                        <span id="greetingText" class="text-muted fw-bold text-uppercase" style="font-size: 0.8rem; letter-spacing: 1px;">PËRSHËNDETJE</span>
                        <h2 class="fw-bold mb-0 mt-1">Mirësevjen, <span id="dashUser" class="text-primary text-capitalize">Përdorues</span>!</h2>
                    </div>
                    <div class="d-none d-md-block">
                        <a href="todo.html" class="btn btn-primary rounded-pill px-4">
                            <i class="fas fa-plus me-2"></i>Mision i Ri
                        </a>
                    </div>
                </div>

                <div class="row g-4 mb-5">
                    <div class="col-md-4">
                        <div class="card border-0 shadow-sm p-4 rounded-4 bg-primary text-white h-100 card-stats">
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <h6 class="text-white-50 mb-0">Gjithsej Misione</h6>
                                <i class="fas fa-list-ul fa-lg text-white-50"></i>
                            </div>
                            <h2 id="totalTasks" class="fw-bold mb-0">0</h2>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card border-0 shadow-sm p-4 rounded-4 bg-success text-white h-100 card-stats">
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <h6 class="text-white-50 mb-0">Të Përfunduara</h6>
                                <i class="fas fa-check-circle fa-lg text-white-50"></i>
                            </div>
                            <h2 id="completedTasks" class="fw-bold mb-0">0</h2>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card border-0 shadow-sm p-4 rounded-4 bg-white h-100 card-stats">
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <h6 class="text-muted mb-0">Efiçenca Ditore</h6>
                                <i class="fas fa-bolt fa-lg text-warning"></i>
                            </div>
                            <h2 id="efficiency" class="fw-bold text-primary mb-0">0%</h2>
                        </div>
                    </div>
                </div>

                <div class="row g-4">
                    <div class="col-lg-8">
                        <div class="card border-0 shadow-sm p-4 rounded-4 bg-white recent-card h-100">
                            <div class="d-flex justify-content-between align-items-center mb-4">
                                <h5 class="fw-bold mb-0">Aktivitetet e Fundit</h5>
                                <a href="todo.html" class="btn btn-link text-primary btn-sm p-0 text-decoration-none">Shih të gjitha</a>
                            </div>
                            <div id="recentActivityList">
                                </div>
                        </div>
                    </div>
                    
                    <div class="col-lg-4">
                        <div class="card border-0 shadow-sm p-4 rounded-4 bg-white category-card h-100">
                            <h5 class="fw-bold mb-4">Fokusimi sipas Kategorive</h5>
                            <div id="categoryStats">
                                </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Mbrojtja e fundit vizuale
        document.addEventListener('DOMContentLoaded', () => {
            document.body.classList.add('auth-checked');
            if (localStorage.getItem('darkMode') === 'enabled') {
                document.body.classList.add('dark-theme');
            }
        });

        function logout() {
            if(confirm("Dëshironi të dilni nga sistemi?")) {
                localStorage.removeItem('proTaskUserName');
                localStorage.removeItem('proTaskUserEmail');
                window.location.href = "index.html";
            }
        }
    </script>
    <script src="dashboard.js"></script>
</body>
</html>
